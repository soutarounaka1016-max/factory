name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pending:
    name: Record CI pending
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"pending\",\"target_url\":\"${RUN_URL}\",\"description\":\"Running tests, build and browser checks\",\"context\":\"ai-factory/ci\"}"

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: pages-dist-${{ github.run_attempt }}
          path: dist
          retention-days: 7

  browser:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: ipad-landscape
            browser: webkit
          - project: ipad-portrait
            browser: webkit
          - project: mobile
            browser: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run browser checks
        shell: bash
        run: |
          set -o pipefail
          npx playwright test --project=${{ matrix.project }} 2>&1 | tee playwright-${{ matrix.project }}.log
      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}-${{ github.run_attempt }}
          path: |
            playwright-report
            test-results
            playwright-${{ matrix.project }}.log
          if-no-files-found: ignore
          retention-days: 14

  report:
    name: Record CI result
    if: always()
    needs: [pending, unit-test, build, browser]
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PENDING_RESULT: ${{ needs.pending.result }}
          UNIT_RESULT: ${{ needs.unit-test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          BROWSER_RESULT: ${{ needs.browser.result }}
        shell: bash
        run: |
          if [ "$PENDING_RESULT" = "success" ] && [ "$UNIT_RESULT" = "success" ] && [ "$BUILD_RESULT" = "success" ] && [ "$BROWSER_RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION="Tests, build and browser checks passed"
          else
            STATE=failure
            DESCRIPTION="One or more CI checks failed"
          fi
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"${STATE}\",\"target_url\":\"${RUN_URL}\",\"description\":\"${DESCRIPTION}\",\"context\":\"ai-factory/ci\"}"
          [ "$STATE" = "success" ]
