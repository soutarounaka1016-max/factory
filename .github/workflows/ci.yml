name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: pages-dist-${{ github.run_attempt }}
          path: dist
          retention-days: 7

  browser:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: webkit
            browser: webkit
          - project: ipad-landscape
            browser: webkit
          - project: ipad-portrait
            browser: webkit
          - project: mobile
            browser: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run browser checks
        shell: bash
        run: |
          set -o pipefail
          npx playwright test --project=${{ matrix.project }} 2>&1 | tee playwright-${{ matrix.project }}.log
      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}-${{ github.run_attempt }}
          path: |
            playwright-report
            test-results
            playwright-${{ matrix.project }}.log
          if-no-files-found: ignore
          retention-days: 14
