name: Deploy Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Reject stale main deployment
        id: latest
        shell: bash
        run: |
          git fetch origin main
          if [ "$(git rev-parse origin/main)" = "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "A newer main commit exists. This deployment is skipped."
          fi
      - name: Record deployment pending
        if: steps.latest.outputs.current == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"pending\",\"target_url\":\"${RUN_URL}\",\"description\":\"Deploying and verifying GitHub Pages\",\"context\":\"ai-factory/pages\"}"
      - uses: actions/setup-node@v4
        if: steps.latest.outputs.current == 'true'
        with:
          node-version: 22
      - run: npm install --ignore-scripts
        if: steps.latest.outputs.current == 'true'
      - run: npm run build
        if: steps.latest.outputs.current == 'true'
      - name: Configure Pages
        if: steps.latest.outputs.current == 'true'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: steps.latest.outputs.current == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Deploy Pages
        if: steps.latest.outputs.current == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Install Chromium for published-site check
        if: steps.latest.outputs.current == 'true'
        run: npx playwright install --with-deps chromium
      - name: Verify published URL
        if: steps.latest.outputs.current == 'true'
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: node scripts/live-smoke.mjs
      - name: Record deployment success
        if: success() && steps.latest.outputs.current == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${RUN_URL}\",\"description\":\"Pages deployed and live smoke check passed\",\"context\":\"ai-factory/pages\"}"
      - name: Record deployment failure
        if: failure() && steps.latest.outputs.current == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"failure\",\"target_url\":\"${RUN_URL}\",\"description\":\"Pages deployment or live smoke check failed\",\"context\":\"ai-factory/pages\"}"
      - name: Upload published-site evidence
        if: always() && steps.latest.outputs.current == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-pages-smoke-${{ github.run_attempt }}
          path: live-smoke.png
          if-no-files-found: ignore
          retention-days: 14
